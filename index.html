<!DOCTYPE html>
<html>
<head>
    <title>My Simple Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff0f5;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d63384;
            font-size: 40px;
            margin-bottom: 20px;
        }

        h3 {
            color: #ff69b4;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        img {
            width: 220px;
            border-radius: 20%;
            border: 3px solid #ffc0cb;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .gallery-item {
            background: white;
            display: inline-block;
            padding: 10px;
            margin: 10px;
            border-radius: 30px;
        }            

        p {
            color: #a64d79;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Mother's Day Specials</h1>
    <p>Made with love for the most special woman 💐</p>

    <div class="gallery-item">
        <h3>Mother's Favourite</h3>
        <img src="images/image1.jpg" alt="Mother's Favourite">
    </div>

    <div class="gallery-item">
        <h3>Blooming Heart</h3>
        <img src="images/image2.jpg" alt="Blooming Heart">
    </div>

    <div class="gallery-item">
        <h3>Sweet Blossom</h3>
        <img src="images/image3.jpg" alt="Sweet Blossom">
    </div>

</body>
</html>
